<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Updates - Live Scores Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; line-height: 1.6; padding: 20px; text-align: center; }
        .wrapper { max-width: 850px; margin: 20px auto; padding: 10px; }
        header { text-align: center; margin-bottom: 25px; }
        header h1 { font-size: 2.8rem; color: #f59e0b; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        header p { color: #94a3b8; font-size: 1.1rem; }
        
        .main-content { background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); border: 1px solid #334155; margin-bottom: 25px; }
        .main-content h2 { margin-bottom: 20px; color: #38bdf8; font-size: 1.6rem; text-align: left; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        
        /* Multi-Match Feed Container */
        #cricket-feed-container { text-align: left; background: #0f172a; border-radius: 8px; padding: 15px; border: 1px solid #475569; max-height: 550px; overflow-y: auto; }
        .feed-item { padding: 15px; border-bottom: 1px solid #1e293b; transition: background 0.2s; }
        .feed-item:last-child { border-bottom: none; }
        .feed-item:hover { background: #1e293b; }
        .feed-item a { color: #38bdf8; font-size: 1.2rem; font-weight: bold; text-decoration: none; display: block; margin-bottom: 5px; }
        .feed-item a:hover { text-decoration: underline; }
        .feed-item p { color: #cbd5e1; font-size: 0.95rem; }
        
        .ad-leaderboard-container { width: 100%; max-width: 728px; min-height: 90px; margin: 20px auto 25px auto; background: #0f172a; border: 2px dashed #475569; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .ad-leaderboard-container span { font-size: 0.75rem; color: #64748b; margin-bottom: 5px; display: block; text-transform: uppercase; }
        
        footer { text-align: center; color: #64748b; font-size: 0.9rem; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>Cricket Updates</h1>
            <p>24/7 Real-Time Live Cricket Scorecard & All Match Analysis</p>
        </header>

        <!-- AAPKA ASLI 728x90 ADSTERRA EMBED CODE -->
        <div class="ad-leaderboard-container">
            <span>Sponsored Advertisement</span>
            
            <script type="text/javascript">
              atOptions = {
                'key' : 'eedf5932f3705ba76f1452adb4403af9',
                'format' : 'iframe',
                'height' : 90,
                'width' : 728,
                'params' : {}
              };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/eedf5932f3705ba76f1452adb4403af9/invoke.js"></script>

        </div>

        <main class="main-content">
            <h2>🔴 All Live Matches, Scores & Commentary</h2>
            
            <!-- AUTOMATIC MULTI MATCH REAL-TIME FEED CARD -->
            <div id="cricket-feed-container">
                <p style="color: #94a3b8; text-align: center; padding: 20px;">Fetching latest live match summaries...</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Cricket Updates Networks. All Rights Reserved.</p>
        </footer>
    </div>

    <!-- FREE REAL-TIME MULTI MATCH CONVERTER SCRIPT -->
    <script>
        async function fetchLiveScores() {
            const container = document.getElementById('cricket-feed-container');
            try {
                const response = await fetch('https://rss2json.com');
                const data = await response.json();
                
                if (data.status === 'ok' && data.items.length > 0) {
                    container.innerHTML = '';
                    data.items.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'feed-item';
                        div.innerHTML = `
                            <a href="${item.link}" target="_blank">${item.title}</a>
                            <p>${item.description || 'Click title to see full live ball-by-ball analysis scorecard.'}</p>
                        `;
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = '<p style="color: #94a3b8; text-align: center; padding: 20px;">No matches are active at this moment. Check back during match hours!</p>';
                }
            } catch (error) {
                container.innerHTML = '<p style="color: #ef4444; text-align: center;">Failed to parse real-time stream feed. Re-attempting connection...</p>';
            }
        }
        
        fetchLiveScores();
        setInterval(fetchLiveScores, 30000);
    </script>
</body>
</html>
